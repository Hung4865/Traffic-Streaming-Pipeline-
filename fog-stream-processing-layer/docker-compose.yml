services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped
    networks:
      - traffic-sentinel-net

  fog_node:
    build:
      context: ./fog
    container_name: fog-node
    env_file:
      - ./.env
    depends_on:
      - mosquitto
    command: python -u fog_node.py
    restart: on-failure
    networks:
      - traffic-sentinel-net

networks:
  traffic-sentinel-net:
    external: true